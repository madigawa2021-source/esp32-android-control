name: Build Flet Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug - List Files
        run: ls -R  # This helps us see where everything is!

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet requests

      - name: Install Flutter and Build APK
        run: |
          # 1. Automatically accept Android licenses
          yes | flutter doctor --android-licenses || true
          
          # 2. Build the APK using the explicit filename
          # We use 'printf' which is more stable than 'yes' for this CLI
          printf "y\nn\n" | flet build apk --module-name main.py
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
